name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint with Ruff
        run: ruff check .

      - name: Type check with Pyright
        run: npx pyright app

      - name: Run tests
        env:
          DATABASE_PATH: "test_leads.db"
          LOG_LEVEL: "DEBUG"
          SERPER_API_KEY: "fake_serper_key_123"
          MAKE_LEAD_KEY: "fake_make_key_123"
          WEBHOOK_URL: "https://hook.eu1.make.com/fake_endpoint"
          SCRAPER_TIMEOUT: "30"
          SCRAPER_RETRIES: "3"
          SCRAPER_MAX_WORKERS: "3"
          SERPER_MAX_RESULTS: "5"
          WEBHOOK_BATCH_SIZE: "10"
        run: pytest tests/test_suite.py